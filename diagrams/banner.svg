<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="340" viewBox="0 0 1280 340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="340" fill="url(#bg)"/>

  <!-- title -->
  <text x="72" y="118" fill="#ffffff" font-size="52" font-weight="700">WireGuard&#8217;s receive path</text>

  <!-- subtitle -->
  <text x="74" y="162" fill="#cbd5e1" font-size="23">Source-level analysis &amp; a six-line fix for the Execution Order Inversion</text>

  <!-- three-engine chips (echoing the deck's colour language) -->
  <g font-size="20" font-weight="700" text-anchor="middle">
    <rect x="74"  y="200" rx="9" ry="9" width="150" height="46" fill="#3b82f6"/>
    <text x="149" y="230" fill="#ffffff">NAPI</text>

    <rect x="240" y="200" rx="9" ry="9" width="200" height="46" fill="#ef4444"/>
    <text x="340" y="230" fill="#ffffff">Workqueue</text>

    <rect x="456" y="200" rx="9" ry="9" width="130" height="46" fill="#22c55e"/>
    <text x="521" y="230" fill="#ffffff">GRO</text>
  </g>

  <!-- arrows between chips -->
  <g stroke="#94a3b8" stroke-width="3" fill="none">
    <path d="M226 223 L238 223" marker-end="url(#a)"/>
    <path d="M442 223 L454 223" marker-end="url(#a)"/>
  </g>
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0 0 L6 3 L0 6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- footer -->
  <text x="74" y="304" fill="#94a3b8" font-size="19">Inria KrakOS (LIG) &#183; M1 MOSIG &#183; Anas Ait El Hadj</text>

  <!-- result badge, right side -->
  <g text-anchor="end">
    <text x="1208" y="150" fill="#ffffff" font-size="64" font-weight="700">&#8722;22%</text>
    <text x="1208" y="182" fill="#cbd5e1" font-size="20">wasted GRO polls (8 peers, M1)</text>
    <text x="1208" y="250" fill="#ffffff" font-size="30" font-weight="700">6-line fix</text>
    <text x="1208" y="278" fill="#cbd5e1" font-size="20">at the trigger, proven correct</text>
  </g>
</svg>
